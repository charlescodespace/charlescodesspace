<svg width="900" height="340" viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Courier New', monospace; }

      .prompt { fill: #58a6ff; }
      .cmd    { fill: #e6edf3; }
      .key    { fill: #79c0ff; }
      .val    { fill: #e6edf3; }
      .out    { fill: #8b949e; }
      .accent { fill: #56d364; }
      .dim    { fill: #30363d; }
      .sep    { fill: #30363d; }
      .tag-bg { fill: #161b22; stroke: #30363d; stroke-width: 1; }
      .tag-txt{ fill: #79c0ff; }

      /* typing animation for verbose text */
      .t1  { animation: reveal 0.05s  0.5s  both; }
      .t2  { animation: reveal 0.05s  0.55s both; }
      .t3  { animation: reveal 0.05s  0.6s  both; }
      .t4  { animation: reveal 0.05s  0.65s both; }
      .t5  { animation: reveal 0.05s  0.7s  both; }
      .t6  { animation: reveal 0.05s  0.75s both; }
      .t7  { animation: reveal 0.05s  0.8s  both; }
      .t8  { animation: reveal 0.05s  0.85s both; }
      .t9  { animation: reveal 0.05s  0.9s  both; }
      .t10 { animation: reveal 0.05s  0.95s both; }
      .t11 { animation: reveal 0.05s  1.0s  both; }
      .t12 { animation: reveal 0.05s  1.05s both; }
      .t13 { animation: reveal 0.05s  1.1s  both; }
      .t14 { animation: reveal 0.05s  1.15s both; }
      .t15 { animation: reveal 0.05s  1.2s  both; }
      .t16 { animation: reveal 0.05s  1.25s both; }
      .t17 { animation: reveal 0.05s  1.3s  both; }
      .t18 { animation: reveal 0.05s  1.35s both; }
      .t19 { animation: reveal 0.05s  1.4s  both; }
      .t20 { animation: reveal 0.05s  1.45s both; }
      .t21 { animation: reveal 0.05s  1.5s  both; }
      .t22 { animation: reveal 0.05s  1.55s both; }
      .t23 { animation: reveal 0.05s  1.6s  both; }
      .t24 { animation: reveal 0.05s  1.65s both; }
      .t25 { animation: reveal 0.05s  1.7s  both; }
      .t26 { animation: reveal 0.05s  1.75s both; }
      .t27 { animation: reveal 0.05s  1.8s  both; }
      .t28 { animation: reveal 0.05s  1.85s both; }
      .t29 { animation: reveal 0.05s  1.9s  both; }
      .t30 { animation: reveal 0.05s  1.95s both; }
      .t31 { animation: reveal 0.05s  2.0s  both; }
      .t32 { animation: reveal 0.05s  2.05s both; }
      .t33 { animation: reveal 0.05s  2.1s  both; }
      .t34 { animation: reveal 0.05s  2.15s both; }
      .t35 { animation: reveal 0.05s  2.2s  both; }
      .t36 { animation: reveal 0.05s  2.25s both; }
      .t37 { animation: reveal 0.05s  2.3s  both; }
      .t38 { animation: reveal 0.05s  2.35s both; }
      .t39 { animation: reveal 0.05s  2.4s  both; }
      .t40 { animation: reveal 0.05s  2.45s both; }
      .t41 { animation: reveal 0.05s  2.5s  both; }
      .t42 { animation: reveal 0.05s  2.55s both; }
      .t43 { animation: reveal 0.05s  2.6s  both; }
      .t44 { animation: reveal 0.05s  2.65s both; }
      .t45 { animation: reveal 0.05s  2.7s  both; }
      .t46 { animation: reveal 0.05s  2.75s both; }
      .t47 { animation: reveal 0.05s  2.8s  both; }
      .t48 { animation: reveal 0.05s  2.85s both; }
      .t49 { animation: reveal 0.05s  2.9s  both; }
      .t50 { animation: reveal 0.05s  2.95s both; }

      @keyframes reveal {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      .cursor {
        animation: blink 1s step-end infinite;
        animation-delay: 3.5s;
        opacity: 0;
      }
      @keyframes blink {
        0%,100% { opacity: 1; }
        50%      { opacity: 0; }
      }

      .fade-in { animation: reveal 0.3s 0.1s both; }
    </style>

    <!-- terminal background -->
    <rect id="bg" width="900" height="340" rx="10" ry="10" fill="#0d1117"/>
    <!-- titlebar -->
    <rect id="tb" width="900" height="36" rx="10" ry="10" fill="#161b22"/>
    <rect y="18" width="900" height="18" fill="#161b22"/>
    <line x1="0" y1="36" x2="900" y2="36" stroke="#21262d" stroke-width="1"/>
  </defs>

  <use href="#bg"/>
  <use href="#tb"/>

  <!-- dots -->
  <circle cx="18" cy="18" r="5.5" fill="#ff5f57"/>
  <circle cx="34" cy="18" r="5.5" fill="#febc2e"/>
  <circle cx="50" cy="18" r="5.5" fill="#28c840"/>
  <text x="66" y="23" font-size="11" fill="#8b949e" letter-spacing="1">charlescodespace@github ~ — bash</text>

  <!-- ══ LEFT COLUMN ══ -->
  <!-- prompt line -->
  <text x="20" y="62" font-size="12" class="fade-in">
    <tspan class="prompt">┌──(</tspan>
    <tspan fill="#56d364"> charles</tspan>
    <tspan class="prompt">@developer</tspan>
    <tspan class="prompt"> )-[ </tspan>
    <tspan class="val">~</tspan>
    <tspan class="prompt"> ]</tspan>
  </text>

  <text x="20" y="80" font-size="12" class="fade-in">
    <tspan class="prompt">└─$</tspan>
    <tspan class="cmd"> cat about.txt</tspan>
  </text>

  <!-- separator -->
  <text x="20" y="98" font-size="12" class="sep fade-in">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

  <!-- info rows -->
  <text x="20" y="116" font-size="12" class="fade-in"><tspan class="key">  USER    </tspan><tspan class="dim"> :: </tspan><tspan class="val">Charles</tspan></text>
  <text x="20" y="134" font-size="12" class="fade-in"><tspan class="key">  USERNAME</tspan><tspan class="dim"> :: </tspan><tspan class="val">charlescodespace</tspan></text>
  <text x="20" y="152" font-size="12" class="fade-in"><tspan class="key">  LOCATION</tspan><tspan class="dim"> :: </tspan><tspan class="val">Bengaluru, India</tspan></text>
  <text x="20" y="170" font-size="12" class="fade-in"><tspan class="key">  ROLE    </tspan><tspan class="dim"> :: </tspan><tspan class="val">Full-Stack Developer | Software Developer</tspan></text>
  <text x="20" y="188" font-size="12" class="fade-in"><tspan class="key">  STATUS  </tspan><tspan class="dim"> :: </tspan><tspan class="accent">🚀 Building the future, one commit at a time</tspan></text>
  <text x="20" y="206" font-size="12" class="fade-in"><tspan class="key">  MOTTO   </tspan><tspan class="dim"> :: </tspan><tspan class="out">"Code. Create. Innovate. Repeat"</tspan></text>

  <!-- separator -->
  <text x="20" y="224" font-size="12" class="sep fade-in">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

  <text x="20" y="242" font-size="12" class="fade-in">
    <tspan class="prompt">└─$</tspan>
    <tspan class="cmd"> ls ./skills/</tspan>
  </text>

  <!-- Skills Row 1 -->
  <rect x="20" y="250" width="40" height="18" rx="3" class="tag-bg"/>
  <text x="24" y="263" font-size="11" class="tag-txt fade-in">Java</text>

  <rect x="66" y="250" width="52" height="18" rx="3" class="tag-bg"/>
  <text x="70" y="263" font-size="11" class="tag-txt fade-in">Python</text>

  <rect x="124" y="250" width="66" height="18" rx="3" class="tag-bg"/>
  <text x="128" y="263" font-size="11" class="tag-txt fade-in">React.js</text>

  <rect x="196" y="250" width="60" height="18" rx="3" class="tag-bg"/>
  <text x="200" y="263" font-size="11" class="tag-txt fade-in">FastAPI</text>

  <!-- Skills Row 2 -->
  <rect x="20" y="274" width="46" height="18" rx="3" class="tag-bg"/>
  <text x="24" y="287" font-size="11" class="tag-txt fade-in">MySQL</text>

  <rect x="72" y="274" width="80" height="18" rx="3" class="tag-bg"/>
  <text x="76" y="287" font-size="11" class="tag-txt fade-in">PostgreSQL</text>

  <rect x="158" y="274" width="32" height="18" rx="3" class="tag-bg"/>
  <text x="162" y="287" font-size="11" class="tag-txt fade-in">Git</text>

  <rect x="196" y="274" width="52" height="18" rx="3" class="tag-bg"/>
  <text x="200" y="287" font-size="11" class="tag-txt fade-in">GitHub</text>

  <!-- ══ RIGHT COLUMN ══ -->
  <text x="468" y="62" font-size="12" class="sep fade-in">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

  <text x="468" y="80" font-size="12" class="fade-in">
    <tspan class="prompt">└─$</tspan>
    <tspan class="cmd"> whoami --verbose</tspan>
  </text>

  <!-- typed verbose text -->
  <g aria-label="A passionate Full-Stack Developer and Software Developer focused on building scalable, user-friendly, and impactful applications. Experience includes web development, backend systems, databases, and software engineering projects. Every project is an opportunity to learn, innovate, and create solutions that make a difference.">
    <!-- Line 1 -->
    <text x="468" y="100" font-size="11.5" class="out" aria-hidden="true">
      <tspan class="t1">A </tspan><tspan class="t2">passionate </tspan><tspan class="t3">Full-Stack </tspan><tspan class="t4">Developer </tspan><tspan class="t5">and</tspan>
    </text>
    <!-- Line 2 -->
    <text x="468" y="118" font-size="11.5" class="out" aria-hidden="true">
      <tspan class="t6">Software </tspan><tspan class="t7">Developer </tspan><tspan class="t8">focused </tspan><tspan class="t9">on </tspan><tspan class="t10">building</tspan>
    </text>
    <!-- Line 3 -->
    <text x="468" y="136" font-size="11.5" class="out" aria-hidden="true">
      <tspan class="t11">scalable, </tspan><tspan class="t12">user-friendly, </tspan><tspan class="t13">and </tspan><tspan class="t14">impactful</tspan>
    </text>
    <!-- Line 4 -->
    <text x="468" y="154" font-size="11.5" class="out" aria-hidden="true">
      <tspan class="t15">applications.</tspan>
    </text>
    <!-- Line 5 -->
    <text x="468" y="178" font-size="11.5" class="out" aria-hidden="true">
      <tspan class="t16">Experience </tspan><tspan class="t17">includes </tspan><tspan class="t18">web </tspan><tspan class="t19">development,</tspan>
    </text>
    <!-- Line 6 -->
    <text x="468" y="196" font-size="11.5" class="out" aria-hidden="true">
      <tspan class="t20">backend </tspan><tspan class="t21">systems, </tspan><tspan class="t22">databases, </tspan><tspan class="t23">and</tspan>
    </text>
    <!-- Line 7 -->
    <text x="468" y="214" font-size="11.5" class="out" aria-hidden="true">
      <tspan class="t24">software </tspan><tspan class="t25">engineering </tspan><tspan class="t26">projects.</tspan>
    </text>
    <!-- Line 8 -->
    <text x="468" y="238" font-size="11.5" class="out" aria-hidden="true">
      <tspan class="t27">Every </tspan><tspan class="t28">project </tspan><tspan class="t29">is </tspan><tspan class="t30">an </tspan><tspan class="t31">opportunity </tspan><tspan class="t32">to</tspan>
    </text>
    <!-- Line 9 -->
    <text x="468" y="256" font-size="11.5" class="out" aria-hidden="true">
      <tspan class="t33">learn, </tspan><tspan class="t34">innovate, </tspan><tspan class="t35">and </tspan><tspan class="t36">create </tspan><tspan class="t37">solutions</tspan>
    </text>
    <!-- Line 10 -->
    <text x="468" y="274" font-size="11.5" class="out" aria-hidden="true">
      <tspan class="t38">that </tspan><tspan class="t39">make </tspan><tspan class="t40">a </tspan><tspan class="t41">difference.</tspan>
    </text>
  </g>

  <!-- separator after verbose -->
  <text x="468" y="300" font-size="12" class="sep t45">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

  <!-- final prompt + blinking cursor -->
  <text x="468" y="320" font-size="12" class="t50">
    <tspan class="prompt">└─$</tspan>
    <tspan> </tspan>
  </text>
  <rect x="503" y="308" width="7" height="13" fill="#58a6ff" class="cursor"/>
</svg>
